<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1917;
      --surface: #28251f;
      --border: #3a3630;
      --text: #f5f0e8;
      --subtext: #7a7166;
      --accent: #f59e0b;

      --note-1: #fef08a;
      --note-2: #bbf7d0;
      --note-3: #bfdbfe;
      --note-4: #fecaca;
      --note-5: #e9d5ff;

      --note-1-dark: #ca8a04;
      --note-2-dark: #16a34a;
      --note-3-dark: #2563eb;
      --note-4-dark: #dc2626;
      --note-5-dark: #9333ea;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Karla', sans-serif;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.04) 0%, transparent 60%);
    }

    /* Subtle dot grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* ── Top bar ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(28,25,23,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(16px, 4vw, 48px);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 4px;
      display: grid;
      place-items: center;
      font-size: 16px;
      transform: rotate(-3deg);
      flex-shrink: 0;
    }

    .brand-name {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .note-count {
      font-size: 12px;
      font-family: 'Karla', sans-serif;
      color: var(--subtext);
      letter-spacing: 0.05em;
    }

    .btn-add {
      background: var(--accent);
      color: #1c1917;
      border: none;
      padding: 8px 20px;
      border-radius: 4px;
      font-family: 'Karla', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.02em;
    }

    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(245,158,11,0.35);
    }

    .btn-add:active { transform: translateY(0); }

    /* ── Main board ── */
    main {
      padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 48px);
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 0.5s 0.1s ease forwards;
    }

    .empty-icon {
      font-size: 64px;
      line-height: 1;
      filter: grayscale(0.3);
    }

    .empty-title {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .empty-sub {
      font-size: 14px;
      color: var(--subtext);
      max-width: 280px;
      line-height: 1.6;
    }

    /* ── Notes grid ── */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    /* ── Note card ── */
    .note {
      border-radius: 2px;
      padding: 20px 18px 14px;
      position: relative;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      transform: rotate(var(--r, 0deg));
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
      animation: noteIn 0.3s cubic-bezier(.34,1.56,.64,1) both;
    }

    .note::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--note-accent);
      border-radius: 2px 2px 0 0;
    }

    /* Tape effect */
    .note::after {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      backdrop-filter: blur(2px);
    }

    .note:hover {
      transform: rotate(0deg) translateY(-4px);
      box-shadow: 4px 12px 36px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
      z-index: 10;
    }

    .note-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }

    .note-title-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Caveat', cursive;
      font-size: 19px;
      font-weight: 700;
      color: #1a1713;
      width: 100%;
      line-height: 1.2;
      resize: none;
      overflow: hidden;
    }

    .note-title-input::placeholder { opacity: 0.4; }

    .note-menu-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: rgba(0,0,0,0.3);
      font-size: 18px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .note-menu-btn:hover { color: rgba(0,0,0,0.7); }

    .note-body-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Caveat', cursive;
      font-size: 16px;
      color: #2a2520;
      width: 100%;
      flex: 1;
      resize: none;
      line-height: 1.55;
      min-height: 80px;
    }

    .note-body-input::placeholder { opacity: 0.35; }

    .note-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,0.1);
    }

    .note-date {
      font-size: 10px;
      font-family: 'Karla', sans-serif;
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.05em;
    }

    .note-delete-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.15s;
      padding: 2px 4px;
    }

    .note:hover .note-delete-btn { opacity: 1; }

    /* Color palette */
    .color-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .color-dot:hover, .color-dot.selected {
      transform: scale(1.3);
      border-color: rgba(0,0,0,0.3);
    }

    /* Color classes */
    .note[data-color="1"] { background: var(--note-1); --note-accent: var(--note-1-dark); }
    .note[data-color="2"] { background: var(--note-2); --note-accent: var(--note-2-dark); }
    .note[data-color="3"] { background: var(--note-3); --note-accent: var(--note-3-dark); }
    .note[data-color="4"] { background: var(--note-4); --note-accent: var(--note-4-dark); }
    .note[data-color="5"] { background: var(--note-5); --note-accent: var(--note-5-dark); }

    /* ── Animations ── */
    @keyframes noteIn {
      from { opacity: 0; transform: rotate(var(--r, 0deg)) scale(0.85) translateY(12px); }
      to   { opacity: 1; transform: rotate(var(--r, 0deg)) scale(1) translateY(0); }
    }

    @keyframes noteOut {
      to { opacity: 0; transform: scale(0.75); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .note.removing {
      animation: noteOut 0.25s ease forwards;
      pointer-events: none;
    }

    /* ── Toolbar tooltip / localStorage badge ── */
    .ls-badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 14px;
      font-family: 'Karla', sans-serif;
      font-size: 11px;
      color: var(--subtext);
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeIn 0.5s 0.8s ease forwards;
    }

    .ls-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-icon">📝</div>
      <div class="brand-name">Sticky Notes</div>
    </div>
    <div class="header-right">
      <span class="note-count" id="noteCount">0 notes</span>
      <button class="btn-add" id="btnAdd">
        <span>＋</span> New Note
      </button>
    </div>
  </header>

  <main id="main"></main>

  <div class="ls-badge">
    <div class="ls-dot"></div>
    SYNCED TO LOCALSTORAGE
  </div>

  <script>
    const STORAGE_KEY = 'sticky-notes-v1';
    const COLORS = ['#fef08a','#bbf7d0','#bfdbfe','#fecaca','#e9d5ff'];
    const ROTATIONS = [-2, -1, 0, 1, 2, -1.5, 1.5, -0.5, 0.5, 2.5];

    let notes = [];

    // ── Persist ──────────────────────────────
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      updateCount();
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        notes = raw ? JSON.parse(raw) : [];
      } catch { notes = []; }
    }

    function updateCount() {
      const el = document.getElementById('noteCount');
      el.textContent = notes.length === 0
        ? 'no notes'
        : notes.length === 1 ? '1 note' : `${notes.length} notes`;
    }

    // ── Note helpers ─────────────────────────
    function createNote(partial = {}) {
      return {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2),
        title: '',
        body: '',
        color: 1,
        created: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
        rotation: ROTATIONS[Math.floor(Math.random() * ROTATIONS.length)],
        ...partial
      };
    }

    function addNote() {
      const note = createNote();
      notes.unshift(note);
      save();
      render();
      // Focus the new note's title
      requestAnimationFrame(() => {
        const el = document.querySelector(`[data-id="${note.id}"] .note-title-input`);
        if (el) el.focus();
      });
    }

    function deleteNote(id) {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) {
        el.classList.add('removing');
        el.addEventListener('animationend', () => {
          notes = notes.filter(n => n.id !== id);
          save();
          render();
        }, { once: true });
      }
    }

    function updateNote(id, field, value) {
      const note = notes.find(n => n.id === id);
      if (note) {
        note[field] = value;
        save();
      }
    }

    // ── Render ────────────────────────────────
    function render() {
      const main = document.getElementById('main');

      if (notes.length === 0) {
        main.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🗒️</div>
            <div class="empty-title">No notes yet</div>
            <div class="empty-sub">Click "New Note" to create your first sticky note. Everything saves automatically.</div>
          </div>`;
        return;
      }

      main.innerHTML = `<div class="notes-grid" id="grid"></div>`;
      const grid = document.getElementById('grid');

      notes.forEach(note => {
        const card = document.createElement('div');
        card.className = 'note';
        card.dataset.id = note.id;
        card.dataset.color = note.color;
        card.style.setProperty('--r', `${note.rotation}deg`);

        card.innerHTML = `
          <div class="note-header">
            <textarea class="note-title-input" rows="1" placeholder="Title…" maxlength="60">${escHtml(note.title)}</textarea>
          </div>
          <textarea class="note-body-input" placeholder="Write something…" rows="4">${escHtml(note.body)}</textarea>
          <div class="color-row">
            ${COLORS.map((c, i) =>
              `<div class="color-dot ${note.color === i+1 ? 'selected' : ''}"
                    style="background:${c}"
                    data-color="${i+1}"
                    title="Color ${i+1}"></div>`
            ).join('')}
          </div>
          <div class="note-footer">
            <span class="note-date">${note.created}</span>
            <button class="note-delete-btn" title="Delete note">🗑️</button>
          </div>
        `;

        // Auto-resize textareas
        card.querySelectorAll('textarea').forEach(ta => autoResize(ta));

        // Events
        card.querySelector('.note-title-input').addEventListener('input', e => {
          autoResize(e.target);
          updateNote(note.id, 'title', e.target.value);
        });

        card.querySelector('.note-body-input').addEventListener('input', e => {
          autoResize(e.target);
          updateNote(note.id, 'body', e.target.value);
        });

        card.querySelector('.note-delete-btn').addEventListener('click', () => deleteNote(note.id));

        card.querySelectorAll('.color-dot').forEach(dot => {
          dot.addEventListener('click', () => {
            updateNote(note.id, 'color', parseInt(dot.dataset.color));
            save();
            render();
          });
        });

        grid.appendChild(card);
      });
    }

    function autoResize(ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }

    function escHtml(str) {
      return str
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // ── Init ──────────────────────────────────
    document.getElementById('btnAdd').addEventListener('click', addNote);

    load();
    render();
    updateCount();
  </script>
</body>
</html>
