<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple News App</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .search-box {
            margin-top: 10px;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        .container {
            width: 90%;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .card h3 {
            margin: 0 0 10px 0;
        }

        .card a {
            color: #0077cc;
            text-decoration: none;
        }

        .loading {
            text-align: center;
            font-size: 18px;
            padding: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>News App</h1>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search topic...">
            <button onclick="searchNews()">Search</button>
        </div>

    </header>

    <div id="loading" class="loading"></div>

    <div class="container" id="newsContainer"></div>

    <script>

        async function fetchNews(query) {

            document.getElementById("loading").innerText = "Loading news...";

            const url = `https://hn.algolia.com/api/v1/search?query=${query}`;

            const res = await fetch(url);
            const data = await res.json();

            console.log("data:", data);

            showNews(data.hits);

            document.getElementById("loading").innerText = "";

        }

        function showNews(news) {

            const container = document.getElementById("newsContainer");

            container.innerHTML = "";

            news.forEach(item => {

                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
<h3>${item.title || "No Title Available"}</h3>
<p>Author: ${item.author}</p>
<a href="${item.url}" target="_blank">Read More</a>
`;

                container.appendChild(card);

            });

        }

        function searchNews() {

            const query = document.getElementById("searchInput").value;

            if (query.trim() !== "") {
                fetchNews(query);
            }

        }

        window.onload = function () {

            // Default news when page loads
            fetchNews("technology");

        };

    </script>

</body>

</html>
